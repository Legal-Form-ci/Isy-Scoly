name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

jobs:
  npm-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run npm audit (high+critical)
        run: bun pm audit --audit-level=high || true
      - name: Fail on critical vulnerabilities
        run: |
          AUDIT_OUTPUT=$(bun pm audit --json 2>/dev/null || echo "{}")
          CRITICAL=$(echo "$AUDIT_OUTPUT" | grep -o '"critical":[0-9]*' | head -1 | cut -d: -f2 || echo "0")
          if [ "${CRITICAL:-0}" -gt 0 ]; then
            echo "❌ Found $CRITICAL critical vulnerabilities"
            exit 1
          fi
          echo "✅ No critical vulnerabilities"

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect leaked secrets
        run: |
          # Scan for common secret patterns in source code
          PATTERNS='(sk_live_|sk_test_|rk_live_|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|re_[a-zA-Z0-9_-]{20,}|eyJ[a-zA-Z0-9_-]{40,}\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+)'
          if grep -rEn "$PATTERNS" src/ supabase/functions/ 2>/dev/null | grep -v 'VITE_SUPABASE_PUBLISHABLE_KEY' | grep -v node_modules; then
            echo "❌ Potential secret leaked in source"
            exit 1
          fi
          echo "✅ No leaked secrets detected"

  lint-types:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint || true
      - run: bunx tsc --noEmit
